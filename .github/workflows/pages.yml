name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Rebuild daily so notices with end dates expire without a manual edit.
    # 12:15 UTC is 7:15 AM CDT or 6:15 AM CST.
    - cron: "15 12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: 0.164.0
  HUGO_DEB_SHA256: 8325f3653032d0fc536503691f4833dc4eb6c6be02ee62466758f3f37a7f2fcd
  HUGO_BASEURL: https://triparishok.github.io/TriParishOK/
  GITHUB_PAGES_PREFIX: /TriParishOK

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install Hugo
        run: |
          wget -O "${RUNNER_TEMP}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          echo "${HUGO_DEB_SHA256}  ${RUNNER_TEMP}/hugo.deb" | sha256sum --check --strict
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Build with Hugo
        run: |
          HUGO_PARAMS_NOINDEX=true hugo --gc --config hugo.toml --baseURL "${HUGO_BASEURL}"

      - name: Validate review SEO metadata
        run: |
          python3 scripts/audit-seo.py public \
            --expected-base "${HUGO_BASEURL}" \
            --expect-noindex yes

      - name: Validate internal links, assets, and path casing
        run: |
          python3 scripts/audit-internal-links.py public \
            --expected-base "${HUGO_BASEURL}"

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./public

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
