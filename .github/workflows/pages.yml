name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: 0.164.0
  HUGO_BASEURL: https://amberlargent.me/TriParishOK/
  GITHUB_PAGES_PREFIX: /TriParishOK

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Hugo
        run: |
          wget -O "${RUNNER_TEMP}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        run: |
          hugo --gc --minify --baseURL "${HUGO_BASEURL}"

      - name: Rewrite root-relative paths for GitHub Pages
        run: |
          python3 <<'PY2'
          from pathlib import Path
          import os
          import re

          prefix = os.environ["GITHUB_PAGES_PREFIX"].rstrip("/")
          public = Path("public")
          exts = {".html", ".xml", ".css", ".js", ".json", ".webmanifest"}

          def should_rewrite(url):
              return (
                  url.startswith("/")
                  and not url.startswith("//")
                  and not url.startswith(prefix + "/")
              )

          def rewrite_quoted_attr(match):
              attr, quote, url = match.groups()
              if should_rewrite(url):
                  url = prefix + url
              return f"{attr}{quote}{url}{quote}"

          def rewrite_unquoted_attr(match):
              attr, url = match.groups()
              if should_rewrite(url):
                  url = prefix + url
              return f"{attr}{url}"

          def rewrite_css_url(match):
              quote, url = match.groups()
              if should_rewrite(url):
                  url = prefix + url
              return f"url({quote}{url}{quote})"

          for path in public.rglob("*"):
              if not path.is_file() or path.suffix.lower() not in exts:
                  continue

              text = path.read_text(errors="ignore")
              original = text

              # href="/..." src="/..." action="/..."
              text = re.sub(
                  r'(\b(?:href|src|action)=)(["\'])(/(?!/)[^"\']*)\2',
                  rewrite_quoted_attr,
                  text,
              )

              # href=/... src=/... action=/...
              text = re.sub(
                  r'(\b(?:href|src|action)=)(/(?!/)[^\s>]+)',
                  rewrite_unquoted_attr,
                  text,
              )

              # CSS url("/..."), url('/...'), url(/...)
              text = re.sub(
                  r'url\((["\']?)(/(?!/)[^)\'"]+)\1\)',
                  rewrite_css_url,
                  text,
              )

              if text != original:
                  path.write_text(text)
          PY2

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
